<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>小红书标题生成器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{background:#0f172a;min-height:100vh;max-width:500px;margin:0 auto;color:#e2e8f0;padding:24px 16px 80px}
.header{text-align:center;padding:20px 0 24px}
.header .icon{font-size:40px;margin-bottom:8px}
.header h1{font-size:22px;font-weight:700}
.header p{font-size:13px;color:#64748b;margin-top:4px}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;margin-bottom:16px}
.card h3{font-size:15px;margin-bottom:14px;font-weight:600}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:#94a3b8;margin-bottom:4px;font-weight:600}
.field input,.field select{width:100%;padding:10px 12px;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:14px}
.field input:focus,.field select:focus{outline:none;border-color:#f87171}
.btn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#dc2626,#f97316);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer}
.btn:hover{opacity:.9}.btn:disabled{opacity:.4}
.title-card{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.title-card .rank{font-size:20px;font-weight:800;color:#f87171;width:28px;text-align:center;flex-shrink:0}
.title-card .text{flex:1;font-size:14px;line-height:1.5}
.title-card .copy{background:#334155;color:#e2e8f0;border:none;padding:8px 14px;border-radius:6px;font-size:12px;cursor:pointer;flex-shrink:0}
.title-card .copy:hover{background:#475569}
.tags-block{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.tag-chip{background:#1e3a5f;color:#60a5fa;padding:4px 10px;border-radius:12px;font-size:11px}
#result{display:none}
#loading{display:none;text-align:center;padding:40px}
.spinner{width:40px;height:40px;border:3px solid #334155;border-top-color:#f87171;border-radius:50%;animation:spin .8s linear infinite;margin:16px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;padding:20px;font-size:11px;color:#475569}
.footer a{color:#64748b;text-decoration:none}
.cta-bar{position:sticky;bottom:0;background:linear-gradient(135deg,#1e293b,#0f172a);border-top:1px solid #334155;padding:12px 16px;text-align:center;z-index:100;margin:0 -16px;width:calc(100% + 32px)}
.cta-bar .cta-text{font-size:12px;color:#94a3b8;margin-bottom:4px}
.cta-bar .cta-links{font-size:13px;font-weight:600;color:#38bdf8}
.cta-bar .cta-divider{color:#334155;margin:0 8px}
</style>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag("js",new Date());gtag("config","G-XXXXXXXXXX")</script>
</head>
<body>
<div class="header">
  <div class="icon">📕</div>
  <h1>小红书标题生成器</h1>
  <p>输入主题 · 秒出5个爆款标题 · 一键复制</p>
</div>

<div id="input-section">
  <div class="card">
    <h3>✏️ 输入内容信息</h3>
    <div class="field"><label>文章主题 *</label><input id="topic" placeholder="例如：新人入职第一周该做什么" maxlength="100"></div>
    <div class="field"><label>内容类型</label><select id="type"><option value="干货分享">干货分享</option><option value="经验总结">经验总结</option><option value="好物推荐">好物推荐</option><option value="避坑指南">避坑指南</option><option value="创业记录">创业记录</option></select></div>
    <div class="field"><label>目标人群（选填）</label><input id="audience" placeholder="例如：应届毕业生" maxlength="30"></div>
    <button class="btn" onclick="generate()">🪄 生成爆款标题 生成爆款标题</button>
  </div>
</div>

<div id="loading"><h3>🤖 AI正在撰写标题...</h3><div class="spinner"></div></div>

<div id="result">
  <div id="result-content"></div>
  <button class="btn" onclick="reset()" style="background:#475569;margin-top:12px">🔄 重新生成</button>
</div>

<div class="footer">
  <a href="/">← 返回工具箱首页</a>
</div>

<div class="cta-bar">
  <div class="cta-text">需要完整内容代写/代运营？</div>
  <div class="cta-links">
    <span>闲鱼搜 YHmy</span>
    <span class="cta-divider">|</span>
    <span>微信 Yhgc_2025</span>
  </div>
</div>

<script>
async function generate() {
  var topic = document.getElementById('topic').value.trim()
  if (!topic || topic.length < 2) { alert('请输入文章主题（至少2个字）'); return }
  var type = document.getElementById('type').value
  var audience = document.getElementById('audience').value.trim()

  document.getElementById('input-section').style.display = 'none'
  document.getElementById('loading').style.display = 'block'
  document.getElementById('result').style.display = 'none'

  try {
    var resp = await fetch('/api/xhs-title', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: 'topic=' + encodeURIComponent(topic) + '&type=' + encodeURIComponent(type) + '&audience=' + encodeURIComponent(audience)
    })
    var data = await resp.json()
    document.getElementById('loading').style.display = 'none'
    document.getElementById('result').style.display = 'block'
    if (!data.success) {
      document.getElementById('result-content').innerHTML = '<div class="card"><p style="color:#f87171">' + data.error + '</p></div>'
      return
    }
    render(data)
  } catch(e) {
    document.getElementById('loading').style.display = 'none'
    document.getElementById('result').style.display = 'block'
    document.getElementById('result-content').innerHTML = '<div class="card"><p style="color:#f87171">网络错误，请重试</p></div>'
  }
}

function render(d) {
  var titles = d.titles || []
  var tags = d.tags || []
  var titlesHTML = titles.map(function(t, i) {
    return '<div class="title-card"><span class="rank">' + (i+1) + '</span><span class="text">' + t + '</span><button class="copy" onclick="copyText(this,\'' + t.replace(/'/g, "\'") + '\')">复制</button></div>'
  }).join('')
  var tagsHTML = tags.map(function(t) { return '<span class="tag-chip">#' + t + '</span>' }).join('')

  document.getElementById('result-content').innerHTML =
    '<div class="card"><h3>🔥 生成的标题</h3>' + titlesHTML + '</div>' +
    '<div class="card"><h3>🏷️ 推荐话题标签</h3><div class="tags-block">' + tagsHTML + '</div></div>' +
    '<div class="card" style="text-align:center;background:linear-gradient(135deg,#431407,#1e3a5f);border-color:#f87171"><p style="font-size:14px;font-weight:600;margin-bottom:8px">🚀 需要完整内容代写？</p><p style="font-size:13px;color:#fdba74">闲鱼搜 <b>YHmy</b> · 微信 <b>Yhgc_2025</b> · AI写作+人工精修</p></div>'
}

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(function() {
    btn.textContent = '✅已复制'; setTimeout(function() { btn.textContent = '复制' }, 1500)
  })
}

function reset() {
  document.getElementById('input-section').style.display = ''
  document.getElementById('loading').style.display = 'none'
  document.getElementById('result').style.display = 'none'
  window.scrollTo({top:0,behavior:'smooth'})
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>谊璜贸易 · 供应商管理</title>
<link rel="stylesheet" href="../_shared/css/yihuang.css">
<style>
.sup-card .sc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.sup-card .sc-name{font-size:14px;font-weight:700}
.sup-card .sc-rating{font-size:12px;color:#f59e0b;letter-spacing:1px}
.sup-card .sc-meta{font-size:11px;color:var(--text-secondary);line-height:1.6;margin-top:4px}
.sup-card .sc-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.sup-card .sc-tags span{font-size:9px;padding:2px 8px;border-radius:10px;background:rgba(100,116,139,.1);color:var(--text-muted)}
</style>
</head>
<body>

<div class="top-bar">
  <div class="tb-left">
    <div class="tb-brand">🏭 供应商管理</div>
    <div class="tb-sub">供应商档案 · 采购历史</div>
  </div>
  <div class="tb-right"><span class="tb-badge">v2.0</span></div>
</div>

<div class="summary-bar" id="summary"></div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="搜索供应商..." oninput="render()">
  <button onclick="openPopup()">+ 新增</button>
</div>

<div id="supplierList"></div>

<div class="bottom-nav">
  <a class="bn-item" href="/yihuang/dashboard/"><span class="bn-icon">📊</span><span class="bn-text">概览</span></a>
<a class="bn-item" href="/yihuang/dashboard/"><span class="bn-icon">📊</span><span class="bn-text">概览</span></a>
  <a class="bn-item active" href="/yihuang/suppliers/"><span class="bn-icon">🏭</span><span class="bn-text">供应商</span></a>
  <a class="bn-item" href="/yihuang/inventory/"><span class="bn-icon">📦</span><span class="bn-text">库存</span></a>
  <a class="bn-item" href="/yihuang/orders/"><span class="bn-icon">📦</span><span class="bn-text">订单</span></a>
  <a class="bn-item" href="/yihuang/finance/"><span class="bn-icon">💰</span><span class="bn-text">财务</span></a>
  <a class="bn-item" href="/yihuang/tasks/"><span class="bn-icon">✅</span><span class="bn-text">任务</span></a>
  <a class="bn-item" href="/yihuang/quotes/"><span class="bn-icon">💵</span><span class="bn-text">报价</span></a>
  <a class="bn-item" href="/yihuang/crm/"><span class="bn-icon">👥</span><span class="bn-text">客户</span></a>
    <h3 id="popupTitle">🏭 新增供应商</h3>
    <label>供应商名称</label><input type="text" id="supName" placeholder="公司全称">
    <label>平台/来源</label>
    <select id="supPlatform"><option>1688</option><option>Alibaba</option><option>线下</option><option>推荐</option><option>其他</option></select>
    <label>评分 (1-5)</label><input type="number" id="supRating" min="1" max="5" step="0.5" value="4">
    <label>主营品类</label><input type="text" id="supCategory" placeholder="如：调味品、粮食">
    <label>联系人</label><input type="text" id="supContact" placeholder="联系人姓名">
    <label>联系方式</label><input type="text" id="supPhone" placeholder="电话/微信">
    <label>付款条件</label><input type="text" id="supPayment" placeholder="如：T/T 30%订金">
    <label>备注</label><textarea id="supNotes" rows="2"></textarea>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closePopup()">取消</button>
      <button class="btn btn-primary" onclick="save()">✅ 保存</button>
    </div>
    <input type="hidden" id="editId">
  </div>
</div>

<script src="../_shared/js/yihuang.js"></script>
<script src="../_shared/js/yihuang-db.js"></script>
<script>
const $=id=>document.getElementById(id);
let DATA=loadData('yihuang_suppliers')||{suppliers:[]};

function saveAll(){saveData('yihuang_suppliers',DATA);}

function render(){
  const q=$('searchInput').value.toLowerCase();
  let f=DATA.suppliers;
  if(q)f=f.filter(s=>s.name.toLowerCase().includes(q)||(s.category||'').toLowerCase().includes(q)||(s.contact||'').toLowerCase().includes(q));

  const total=DATA.suppliers.length,active=DATA.suppliers.filter(s=>s.status!=='inactive').length;
  const avgRating=total?(DATA.suppliers.reduce((s,x)=>s+parseFloat(x.rating||4),0)/total).toFixed(1):'-';
  $('summary').innerHTML=`
    <div class="summary-item"><div class="si-value">${total}</div><div class="si-label">总供应商</div></div>
    <div class="summary-item"><div class="si-value">${active}</div><div class="si-label">活跃</div></div>
    <div class="summary-item"><div class="si-value">${avgRating}</div><div class="si-label">平均评分</div></div>`;

  const el=$('supplierList');
  if(!f.length){
    el.innerHTML='<div class="empty-state"><div class="empty-icon">🏭</div><div class="empty-title">暂无供应商</div><div class="empty-desc">点击"+新增"添加第一个供应商</div></div>';
    return;
  }
  el.innerHTML=f.map(s=>`
    <div class="item-card sup-card fade-in">
      <div class="sc-header">
        <div class="sc-name">${s.name}</div>
        <div class="sc-rating">${'★'.repeat(Math.floor(s.rating||4))}${(s.rating||4)%1>=0.5?'½':''}</div>
      </div>
      <div class="sc-meta">
        ${s.platform?'📌 '+s.platform:''}${s.category?' · '+s.category:''}
        ${s.contact?'<br>📞 '+s.contact+(s.phone?' · '+s.phone:''):''}
        ${s.payment?'<br>💳 '+s.payment:''}
        ${s.notes?'<br>💬 '+s.notes:''}
      </div>
      <div class="sc-tags"><span>${s.status==='inactive'?'停用':'活跃'}</span></div>
      <div class="actions">
        <span class="act-edit" onclick="edit('${s.id}')">✏️ 编辑</span>
        <span class="act-delete" onclick="del('${s.id}')">🗑 删除</span>
      </div>
    </div>`).join('');
}

function openPopup(){
  $('popupTitle').textContent='🏭 新增供应商';$('editId').value='';
  ['supName','supCategory','supContact','supPhone','supPayment','supNotes'].forEach(id=>$(id).value='');
  $('supPlatform').value='1688';$('supRating').value='4';$('popup').classList.add('show');
}
function closePopup(){$('popup').classList.remove('show')}

function save(){
  const name=$('supName').value.trim();if(!name)return showToast('请输入供应商名称');
  const editId=$('editId').value;
  const obj={name,platform:$('supPlatform').value,rating:parseFloat($('supRating').value)||4,category:$('supCategory').value.trim(),contact:$('supContact').value.trim(),phone:$('supPhone').value.trim(),payment:$('supPayment').value.trim(),notes:$('supNotes').value.trim(),status:'active'};
  if(editId){const s=DATA.suppliers.find(x=>x.id===editId);if(s)Object.assign(s,obj);}
  else{obj.id=uuid();obj.createdAt=now();DATA.suppliers.push(obj);}
  saveAll();render();closePopup();showToast('✅ 已保存');
}
function edit(id){const s=DATA.suppliers.find(x=>x.id===id);if(!s)return;
  $('popupTitle').textContent='✏️ 编辑供应商';$('editId').value=id;
  $('supName').value=s.name;$('supPlatform').value=s.platform||'1688';$('supRating').value=s.rating||4;
  $('supCategory').value=s.category||'';$('supContact').value=s.contact||'';$('supPhone').value=s.phone||'';
  $('supPayment').value=s.payment||'';$('supNotes').value=s.notes||'';$('popup').classList.add('show');
}
function del(id){if(confirm('确定删除？')){DATA.suppliers=DATA.suppliers.filter(s=>s.id!==id);saveAll();render();showToast('🗑 已删除');}}

document.querySelectorAll('.popup-overlay').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('show')})});
render();
</script>
</body>
</html>

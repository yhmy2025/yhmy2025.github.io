<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>供应商评分 — 谊璜贸易</title>
<link rel="stylesheet" href="../_shared/css/yihuang.css">
<style>
.score-bar { height:8px; border-radius:4px; background:#334155; margin:4px 0 8px; overflow:hidden; }
.score-fill { height:100%; border-radius:4px; transition:width .3s; }
.score-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.score-item { background:#0f172a; border-radius:8px; padding:12px; text-align:center; }
.score-item .val { font-size:28px; font-weight:700; }
.score-stars { color:#fbbf24; font-size:18px; letter-spacing:2px; }
.risk-tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
.risk-red { background:#7f1d1d; color:#fca5a5; }
.risk-yellow { background:#713f12; color:#fde68a; }
.risk-green { background:#14532d; color:#86efac; }
</style>
</head>
<body>
<div class="header">
  <h1>供应商评分系统</h1>
  <p class="sub">四维度加权评分 · 历史采购追溯</p>
</div>

<div class="card">
  <div class="card-title">选择供应商</div>
  <select id="supplierSelect" style="width:100%;padding:10px;background:#0f172a;color:#e2e8f0;border:1px solid #334155;border-radius:6px;" onchange="showSupplier()">
    <option value="">-- 选择供应商进行评分 --</option>
  </select>
</div>

<div id="supplierDetail" style="display:none;">
  <div class="card">
    <div class="card-title" id="supplierName">供应商详情</div>
    <div class="score-grid">
      <div class="score-item"><div style="font-size:11px;color:#94a3b8;">综合评分</div><div class="val" id="overallScore" style="color:#38bdf8;">-</div></div>
      <div class="score-item"><div style="font-size:11px;color:#94a3b8;">采购次数</div><div class="val" id="orderCount" style="color:#e2e8f0;">0</div></div>
      <div class="score-item"><div style="font-size:11px;color:#94a3b8;">累计金额</div><div class="val" id="totalAmount" style="color:#e2e8f0;">¥0</div></div>
      <div class="score-item"><div style="font-size:11px;color:#94a3b8;">最近采购</div><div class="val" id="lastOrder" style="font-size:13px;color:#94a3b8;">-</div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">四维度评分（1-5分）</div>
    <div style="margin-bottom:12px;">
      <label style="font-size:13px;color:#94a3b8;">产品质量 (35%)</label>
      <input type="range" id="scoreQuality" min="1" max="5" value="3" style="width:100%;" oninput="updateScorePreview()">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#64748b;"><span>1-退货多</span><span>3-可接受</span><span>5-零缺陷</span></div>
    </div>
    <div style="margin-bottom:12px;">
      <label style="font-size:13px;color:#94a3b8;">交货准时 (30%)</label>
      <input type="range" id="scoreDelivery" min="1" max="5" value="3" style="width:100%;" oninput="updateScorePreview()">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#64748b;"><span>1-常延期</span><span>3-偶延期</span><span>5-100%准时</span></div>
    </div>
    <div style="margin-bottom:12px;">
      <label style="font-size:13px;color:#94a3b8;">价格竞争力 (20%)</label>
      <input type="range" id="scorePrice" min="1" max="5" value="3" style="width:100%;" oninput="updateScorePreview()">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#64748b;"><span>1-偏高15%+</span><span>3-行业持平</span><span>5-低10%+</span></div>
    </div>
    <div style="margin-bottom:12px;">
      <label style="font-size:13px;color:#94a3b8;">服务配合 (15%)</label>
      <input type="range" id="scoreService" min="1" max="5" value="3" style="width:100%;" oninput="updateScorePreview()">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#64748b;"><span>1-不配合</span><span>3-可协商</span><span>5-高度配合</span></div>
    </div>

    <div style="background:#1a2332;border-radius:8px;padding:16px;margin-top:12px;">
      <div style="display:flex;justify-content:space-between;font-size:14px;color:#e2e8f0;">
        <span>加权综合评分</span>
        <span id="calcScore" style="font-size:24px;font-weight:700;color:#38bdf8;">3.0</span>
      </div>
      <div class="score-bar"><div class="score-fill" id="scoreFill" style="width:60%;background:#38bdf8;"></div></div>
      <div id="scoreRating" style="font-size:13px;text-align:center;margin-top:4px;"></div>
    </div>
  </div>

  <div style="display:flex;gap:8px;margin:0 16px 16px;">
    <button class="btn btn-primary" onclick="submitScore()" style="flex:1;">提交评分</button>
    <button class="btn btn-outline" onclick="toggleBlacklist()" id="blacklistBtn" style="flex:1;">标记黑名单</button>
  </div>
</div>

<div class="footer">谊璜贸易系统 · 供应商评分</div>
<nav class="bottom-nav" id="bottomNav"></nav>

<script src="../_shared/js/yihuang-db.js"></script>
<script src="../_shared/js/yihuang.js"></script>
<script>
let currentSupplierId = null;

function loadSuppliers() {
  const suppliers = YH.getSuppliers();
  const sel = document.getElementById('supplierSelect');
  suppliers.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = s.name || s.company || s.id;
    sel.appendChild(opt);
  });
  if (typeof renderBottomNav === 'function') {
    document.getElementById('bottomNav').innerHTML = renderBottomNav('suppliers');
  }
}

function showSupplier() {
  const id = document.getElementById('supplierSelect').value;
  if (!id) { document.getElementById('supplierDetail').style.display = 'none'; return; }
  currentSupplierId = id;
  document.getElementById('supplierDetail').style.display = 'block';

  const s = YH.getSupplierById(id);
  document.getElementById('supplierName').textContent = s.name || s.company || id;

  // Stats
  const orders = YH.getOrders().filter(o => o.supplierId === id);
  document.getElementById('orderCount').textContent = orders.length;
  const totalAmt = orders.reduce((sum, o) => sum + (parseFloat(o.totalPrice) || parseFloat(o.amount) || 0), 0);
  document.getElementById('totalAmount').textContent = '¥' + totalAmt.toLocaleString();
  const last = orders.sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''))[0];
  document.getElementById('lastOrder').textContent = last ? (last.createdAt||'').slice(0,10) : '-';

  // Scores
  const scores = s.scores || {};
  document.getElementById('scoreQuality').value = scores.quality || 3;
  document.getElementById('scoreDelivery').value = scores.delivery || 3;
  document.getElementById('scorePrice').value = scores.price || 3;
  document.getElementById('scoreService').value = scores.service || 3;
  document.getElementById('overallScore').textContent = s.score || '-';

  // Blacklist status
  const btn = document.getElementById('blacklistBtn');
  if (s.blacklisted) {
    btn.textContent = '取消黑名单';
    btn.style.background = '#14532d';
  } else {
    btn.textContent = '标记黑名单';
    btn.style.background = '';
  }

  updateScorePreview();
}

function updateScorePreview() {
  const q = parseInt(document.getElementById('scoreQuality').value);
  const d = parseInt(document.getElementById('scoreDelivery').value);
  const p = parseInt(document.getElementById('scorePrice').value);
  const s = parseInt(document.getElementById('scoreService').value);

  const weighted = q * 0.35 + d * 0.30 + p * 0.20 + s * 0.15;
  const score = Math.round(weighted * 10) / 10;

  document.getElementById('calcScore').textContent = score;
  document.getElementById('scoreFill').style.width = (score / 5 * 100) + '%';

  let rating, color;
  if (score >= 4.0) { rating = '核心供应商'; color = '#86efac'; }
  else if (score >= 3.0) { rating = '常规供应商'; color = '#fde68a'; }
  else if (score >= 2.0) { rating = '观察供应商'; color = '#fdba74'; }
  else { rating = '建议淘汰'; color = '#fca5a5'; }

  document.getElementById('scoreRating').innerHTML =
    `<span class="risk-tag" style="background:${color}20;color:${color};">${rating}</span>`;
  document.getElementById('scoreFill').style.background = color;
  document.getElementById('calcScore').style.color = color;
}

function submitScore() {
  if (!currentSupplierId) return;
  const scores = {
    quality: parseInt(document.getElementById('scoreQuality').value),
    delivery: parseInt(document.getElementById('scoreDelivery').value),
    price: parseInt(document.getElementById('scorePrice').value),
    service: parseInt(document.getElementById('scoreService').value),
  };
  const result = YH.scoreSupplier(currentSupplierId, scores);
  document.getElementById('overallScore').textContent = result.score;
  alert('评分已保存！综合评分: ' + result.score + ' — ' +
    (result.score >= 4 ? '核心供应商' : result.score >= 3 ? '常规供应商' : result.score >= 2 ? '观察供应商' : '建议淘汰'));
}

function toggleBlacklist() {
  if (!currentSupplierId) return;
  const suppliers = YH.getSuppliers();
  const idx = suppliers.findIndex(s => s.id === currentSupplierId);
  if (idx === -1) return;
  suppliers[idx].blacklisted = !suppliers[idx].blacklisted;
  YH.saveSuppliers(suppliers);
  showSupplier();
  alert(suppliers[idx].blacklisted ? '已标记为黑名单' : '已取消黑名单');
}

loadSuppliers();
</script>
</body>
</html>

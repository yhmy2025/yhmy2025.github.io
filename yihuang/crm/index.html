<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>谊璜贸易 · 客户管理</title>
<link rel="stylesheet" href="../_shared/css/yihuang.css">
<style>
.client-card .cc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.client-card .cc-name{font-size:14px;font-weight:700}
.client-card .cc-level{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.level-A{background:rgba(34,197,94,.15);color:#34d399}
.level-B{background:rgba(251,191,36,.15);color:#fbbf24}
.level-C{background:rgba(148,163,184,.15);color:#94a3b8}
.client-card .cc-info{font-size:11px;color:var(--text-secondary);line-height:1.6;margin-top:4px}
.client-card .cc-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.client-card .cc-tags span{font-size:9px;padding:2px 8px;border-radius:10px;background:rgba(100,116,139,.1);color:var(--text-muted)}
</style>
</head>
<body>

<div class="top-bar">
  <div class="tb-left">
    <div class="tb-brand">👥 客户管理</div>
    <div class="tb-sub">CRM · 客户关系管理</div>
  </div>
  <div class="tb-right"><span class="tb-badge">v2.0</span></div>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="搜索客户名称/联系人..." oninput="render()">
  <button onclick="openPopup()">+ 新增</button>
</div>

<div class="filter-tabs" id="filterTabs"></div>

<div id="clientList"></div>



<div class="popup-overlay" id="popup">
  <div class="popup">
    <h3 id="popupTitle">👤 新增客户</h3>
    <label>客户名称</label>
    <input type="text" id="clientName" placeholder="公司/个人名称">
    <label>客户等级</label>
    <select id="clientLevel">
      <option value="A">A级 — 重点客户</option><option value="B">B级 — 潜力客户</option><option value="C">C级 — 一般客户</option>
    </select>
    <label>来源</label>
    <select id="clientSource">
      <option>展会</option><option>1688</option><option>推荐</option><option>线上</option><option>其他</option>
    </select>
    <label>联系人</label>
    <input type="text" id="clientContact" placeholder="联系人姓名">
    <label>电话</label>
    <input type="text" id="clientPhone" placeholder="手机号">
    <label>备注</label>
    <textarea id="clientNotes" rows="2" placeholder="客户特点/需求..."></textarea>
    <label>状态</label>
    <select id="clientStatus">
      <option value="potential">潜在客户</option><option value="negotiating">洽谈中</option><option value="active">合作中</option><option value="inactive">暂缓</option>
    </select>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closePopup()">取消</button>
      <button class="btn btn-primary" onclick="save()">✅ 保存</button>
    </div>
    <input type="hidden" id="editId">
  </div>
</div>

<script src="../_shared/js/yihuang.js"></script>
<script src="../_shared/js/yihuang-db.js"></script>
<script>
const $=id=>document.getElementById(id);
let DATA=loadData('yihuang_crm')||{clients:[]};
let filter='all';

function saveAll(){saveData('yihuang_crm',DATA);}

function render(){
  const q=$('searchInput').value.toLowerCase();
  let f=DATA.clients;
  if(filter!=='all')f=f.filter(c=>c.status===filter);
  if(q)f=f.filter(c=>c.name.toLowerCase().includes(q)||(c.contact||'').toLowerCase().includes(q));

  const statusList=[{id:'all',label:'全部('+DATA.clients.length+')'},{id:'potential',label:'潜在'},{id:'negotiating',label:'洽谈'},{id:'active',label:'合作'},{id:'inactive',label:'暂缓'}];
  $('filterTabs').innerHTML=statusList.map(s=>`<div class="filter-tab ${filter===s.id?'active':''}" onclick="filter='${s.id}';render()">${s.label}</div>`).join('');

  const el=$('clientList');
  if(!f.length){
    el.innerHTML='<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-title">暂无客户数据</div><div class="empty-desc">点击右上角"+新增"<br>添加第一个客户</div></div>';
    return;
  }
  el.innerHTML=f.map(c=>`
    <div class="item-card fade-in">
      <div class="cc-header">
        <div class="cc-name">${c.name}</div>
        <span class="cc-level level-${c.level}">${c.level}级</span>
      </div>
      <div class="cc-info">${c.contact?'📞 '+c.contact+(c.phone?' · '+c.phone:''):''}${c.source?'<br>📌 '+c.source:''}${c.notes?'<br>💬 '+c.notes:''}</div>
      <div class="cc-tags">
        <span>${{potential:'潜在',negotiating:'洽谈中',active:'合作中',inactive:'暂缓'}[c.status]||c.status}</span>
      </div>
      <div class="actions">
        <span class="act-edit" onclick="edit('${c.id}')">✏️ 编辑</span>
        <span class="act-delete" onclick="del('${c.id}')">🗑 删除</span>
      </div>
    </div>`).join('');
}

function openPopup(){
  $('popupTitle').textContent='👤 新增客户';$('editId').value='';
  ['clientName','clientContact','clientPhone','clientNotes'].forEach(id=>$(id).value='');
  $('clientLevel').value='B';$('clientSource').value='其他';$('clientStatus').value='potential';
  $('popup').classList.add('show');
}
function closePopup(){$('popup').classList.remove('show')}

function save(){
  const name=$('clientName').value.trim();if(!name)return showToast('请输入客户名称');
  const editId=$('editId').value;
  const obj={name,level:$('clientLevel').value,source:$('clientSource').value,contact:$('clientContact').value.trim(),phone:$('clientPhone').value.trim(),notes:$('clientNotes').value.trim(),status:$('clientStatus').value};
  if(editId){const c=DATA.clients.find(x=>x.id===editId);if(c)Object.assign(c,obj);}
  else{obj.id=uuid();obj.createdAt=now();DATA.clients.push(obj);}
  saveAll();render();closePopup();showToast('✅ 已保存');
}

function edit(id){const c=DATA.clients.find(x=>x.id===id);if(!c)return;
  $('popupTitle').textContent='✏️ 编辑客户';$('editId').value=id;
  $('clientName').value=c.name;$('clientLevel').value=c.level;$('clientSource').value=c.source||'其他';
  $('clientContact').value=c.contact||'';$('clientPhone').value=c.phone||'';
  $('clientNotes').value=c.notes||'';$('clientStatus').value=c.status;$('popup').classList.add('show');
}
function del(id){if(confirm('确定删除该客户？')){DATA.clients=DATA.clients.filter(c=>c.id!==id);saveAll();render();showToast('🗑 已删除');}}

document.querySelectorAll('.popup-overlay').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('show')})});

render();
</script>

<div class="bottom-nav">
  <a class="bn-item" href="/yihuang/dashboard/"><span class="bn-icon">📊</span><span class="bn-text">概览</span></a>
  <a class="bn-item" class="bn-item active" href="/yihuang/crm/"><span class="bn-icon">👥</span><span class="bn-text">客户</span></a>
  <a class="bn-item" href="/yihuang/orders/"><span class="bn-icon">📦</span><span class="bn-text">订单</span></a>
  <a class="bn-item" href="/yihuang/finance/"><span class="bn-icon">💰</span><span class="bn-text">财务</span></a>
  <a class="bn-item" href="/yihuang/tasks/"><span class="bn-icon">✅</span><span class="bn-text">任务</span></a>
  <a class="bn-item" href="/yihuang/quotes/"><span class="bn-icon">💵</span><span class="bn-text">报价</span></a>
  <a class="bn-item" href="/yihuang/suppliers/"><span class="bn-icon">🏭</span><span class="bn-text">供应商</span></a>
  <a class="bn-item" href="/yihuang/inventory/"><span class="bn-icon">📦</span><span class="bn-text">库存</span></a>
</div>
</body>
</html>

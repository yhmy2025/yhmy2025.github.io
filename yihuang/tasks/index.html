<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>谊璜贸易 · 任务中心</title>
<link rel="stylesheet" href="../_shared/css/yihuang.css">
<style>
.task-card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px;margin-bottom:8px}
.task-card .tc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.task-card .tc-title{font-size:14px;font-weight:600;flex:1}
.task-card .tc-priority{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600}
.priority-high{background:#3b1a1a;color:#ef4444}
.priority-medium{background:#78350f;color:#fbbf24}
.priority-low{background:#1e3a5f;color:#94a3b8}
.task-card .tc-meta{font-size:10px;color:#64748b;display:flex;gap:8px;align-items:center;margin-top:6px}
.task-card .tc-meta .dept-tag{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600}
.task-card .tc-check{width:18px;height:18px;border-radius:5px;border:2px solid #475569;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .15s}
.task-card .tc-check.done{background:#22c55e;border-color:#22c55e;color:#fff}
.task-card .tc-title.done{text-decoration:line-through;color:#64748b}
.task-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto}
.task-tab{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;background:#1e293b;color:#94a3b8;border:1px solid #334155}
.task-tab.active{background:#1e3a5f;color:#38bdf8;border-color:#3b82f6}
</style>
</head>
<body>

<div class="top-bar">
  <div class="tb-left">
    <div class="tb-brand">✅ 任务中心</div>
    <div class="tb-sub">全部门待办 · 优先级管理</div>
  </div>
  <div class="tb-right"><span class="tb-badge">Phase 2</span></div>
</div>

<!-- 统计栏 -->
<div class="summary-bar" id="taskSummary" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px"></div>

<!-- 搜索+新增 -->
<div class="search-bar">
  <input type="text" id="taskSearch" placeholder="搜索任务..." oninput="render()">
  <button onclick="openTaskPopup()">+ 新建</button>
</div>

<!-- 过滤Tabs -->
<div class="task-tabs" id="taskTabs"></div>

<!-- 任务列表 -->
<div id="taskList"></div>

<div class="bottom-nav">
  <a class="bn-item" href="/yihuang/dashboard/"><span class="bn-icon">📊</span><span class="bn-text">仪表盘</span></a>
  <a class="bn-item" href="/yihuang/crm/"><span class="bn-icon">👥</span><span class="bn-text">客户</span></a>
  <a class="bn-item" href="/yihuang/orders/"><span class="bn-icon">📦</span><span class="bn-text">订单</span></a>
  <a class="bn-item active" href="/yihuang/tasks/"><span class="bn-icon">✅</span><span class="bn-text">任务</span></a>
  <a class="bn-item" href="/yihuang/finance/"><span class="bn-icon">💰</span><span class="bn-text">财务</span></a>
  <a class="bn-item" href="/yihuang/suppliers/"><span class="bn-icon">🏭</span><span class="bn-text">供应商</span></a>
  <a class="bn-item" href="/yihuang/inventory/"><span class="bn-icon">📦</span><span class="bn-text">库存</span></a>
</div>

<!-- 新建/编辑任务弹窗 -->
<div class="popup-overlay" id="taskPopup">
  <div class="popup">
    <h3 id="taskPopupTitle">✅ 新建任务</h3>
    <label>任务内容</label>
    <input type="text" id="taskTitle" placeholder="描述任务...">
    <label>所属部门</label>
    <select id="taskDept"></select>
    <label>优先级</label>
    <select id="taskPriority">
      <option value="high">🔴 高优先级</option>
      <option value="medium" selected>🟡 中优先级</option>
      <option value="low">🟢 低优先级</option>
    </select>
    <label>截止日期</label>
    <input type="date" id="taskDue">
    <label>备注</label>
    <input type="text" id="taskNote" placeholder="补充说明...">
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeTaskPopup()">取消</button>
      <button class="btn btn-primary" onclick="saveTask()">✅ 创建</button>
    </div>
    <input type="hidden" id="editTaskId">
  </div>
</div>

<script src="../_shared/js/yihuang.js"></script>
<script>
let DATA = loadData('yihuang_tasks') || { tasks: [] };
let currentFilter = 'all';

function saveAll() { saveData('yihuang_tasks', DATA); }

function render() {
  const query = document.getElementById('taskSearch').value.toLowerCase();
  let filtered = DATA.tasks;
  if (currentFilter === 'pending') filtered = filtered.filter(t => !t.done);
  else if (currentFilter === 'done') filtered = filtered.filter(t => t.done);
  else if (currentFilter === 'high') filtered = filtered.filter(t => t.priority === 'high' && !t.done);
  if (query) filtered = filtered.filter(t => t.title.toLowerCase().includes(query));

  // 统计
  const total = DATA.tasks.length;
  const done = DATA.tasks.filter(t => t.done).length;
  const pending = total - done;
  const high = DATA.tasks.filter(t => t.priority === 'high' && !t.done).length;
  document.getElementById('taskSummary').innerHTML = `
    <div class="summary-item"><div class="si-value">${total}</div><div class="si-label">总任务</div></div>
    <div class="summary-item"><div class="si-value">${pending}</div><div class="si-label">待处理</div></div>
    <div class="summary-item"><div class="si-value" style="color:#ef4444">${high}</div><div class="si-label">高优先</div></div>
    <div class="summary-item"><div class="si-value" style="color:#22c55e">${done}</div><div class="si-label">已完成</div></div>
  `;

  // Tabs
  document.getElementById('taskTabs').innerHTML = [
    {id:'all', label:'全部'},
    {id:'pending', label:'待处理'},
    {id:'done', label:'已完成'},
    {id:'high', label:'🔴 高优先'},
  ].map(t => `<div class="task-tab ${currentFilter===t.id?'active':''}" onclick="currentFilter='${t.id}';render()">${t.label}</div>`).join('');

  const el = document.getElementById('taskList');
  if (!filtered.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">✅</div>暂无任务</div>';
    return;
  }
  filtered.sort((a,b) => a.done === b.done ? 0 : a.done ? 1 : -1);
  el.innerHTML = filtered.map(t => `
    <div class="task-card fade-in">
      <div style="display:flex;gap:10px;align-items:flex-start">
        <div class="tc-check ${t.done?'done':''}" onclick="toggleTask('${t.id}')">${t.done?'✓':''}</div>
        <div style="flex:1">
          <div class="tc-header">
            <div class="tc-title ${t.done?'done':''}">${t.title}</div>
            <span class="tc-priority priority-${t.priority}">${t.priority==='high'?'🔴':t.priority==='medium'?'🟡':'🟢'} ${priLabel(t.priority)}</span>
          </div>
          <div class="tc-meta">
            <span class="dept-tag" style="background:${deptColor(t.dept)};color:#fff">${deptLabel(t.dept)}</span>
            ${t.due ? '<span>📅 ' + formatDate(t.due) + '</span>' : ''}
            <span style="cursor:pointer;color:#38bdf8" onclick="editTask('${t.id}')">✏️</span>
            <span style="cursor:pointer;color:#ef4444" onclick="deleteTask('${t.id}')">🗑</span>
          </div>
          ${t.note ? '<div style="font-size:11px;color:#94a3b8;margin-top:4px">💬 '+t.note+'</div>' : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function priLabel(p) { return {high:'高优先',medium:'中优先',low:'低优先'}[p]||p; }

function toggleTask(id) {
  const t = DATA.tasks.find(x => x.id === id);
  if (t) { t.done = !t.done; saveAll(); render(); }
}

function openTaskPopup() {
  document.getElementById('taskPopupTitle').textContent = '✅ 新建任务';
  document.getElementById('editTaskId').value = '';
  document.getElementById('taskTitle').value = '';
  document.getElementById('taskPriority').value = 'medium';
  document.getElementById('taskDue').value = '';
  document.getElementById('taskNote').value = '';
  const deptEl = document.getElementById('taskDept');
  deptEl.innerHTML = Object.entries(DEPARTMENTS).map(([k,v]) => `<option value="${k}">${v.icon} ${v.name}</option>`).join('');
  document.getElementById('taskPopup').classList.add('show');
}
function closeTaskPopup() { document.getElementById('taskPopup').classList.remove('show'); }

function saveTask() {
  const title = document.getElementById('taskTitle').value.trim();
  if (!title) return showToast('请输入任务内容');
  const editId = document.getElementById('editTaskId').value;
  const obj = { title, dept:document.getElementById('taskDept').value, priority:document.getElementById('taskPriority').value, due:document.getElementById('taskDue').value, note:document.getElementById('taskNote').value.trim() };
  if (editId) {
    const t = DATA.tasks.find(x => x.id === editId);
    if (t) Object.assign(t, obj);
  } else {
    obj.id = uuid(); obj.done = false; obj.createdAt = now();
    DATA.tasks.push(obj);
  }
  saveAll(); render(); closeTaskPopup(); showToast('✅ 已保存');
}

function editTask(id) {
  const t = DATA.tasks.find(x => x.id === id);
  if (!t) return;
  document.getElementById('taskPopupTitle').textContent = '✏️ 编辑任务';
  document.getElementById('editTaskId').value = id;
  document.getElementById('taskTitle').value = t.title;
  document.getElementById('taskPriority').value = t.priority;
  const deptEl = document.getElementById('taskDept');
  deptEl.innerHTML = Object.entries(DEPARTMENTS).map(([k,v]) => `<option value="${k}" ${k===t.dept?'selected':''}>${v.icon} ${v.name}</option>`).join('');
  document.getElementById('taskDue').value = t.due||'';
  document.getElementById('taskNote').value = t.note||'';
  document.getElementById('taskPopup').classList.add('show');
}

function deleteTask(id) {
  if (confirm('确定删除？')) { DATA.tasks = DATA.tasks.filter(t => t.id !== id); saveAll(); render(); showToast('🗑 已删除'); }
}

document.querySelectorAll('.popup-overlay').forEach(el => { el.addEventListener('click', e => { if (e.target === el) el.classList.remove('show'); }); });

render();
</script>
</body>
</html>

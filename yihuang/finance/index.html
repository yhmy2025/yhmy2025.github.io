<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>谊璜贸易 · 财务管理</title>
<link rel="stylesheet" href="../_shared/css/yihuang.css">
<style>
.fin-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.fin-card{text-align:center;padding:16px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm)}
.fin-card .fc-value{font-size:22px;font-weight:800}
.fin-card .fc-label{font-size:10px;color:var(--text-muted);margin-top:3px}
.fin-card.income .fc-value{color:var(--success)}
.fin-card.expense .fc-value{color:var(--danger)}
.fin-card.profit .fc-value{background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.trans-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(51,65,85,.5);font-size:12px}
.trans-item:last-child{border:none}
.trans-amount{font-weight:700;font-size:14px}
.trans-amount.pos{color:var(--success)}.trans-amount.neg{color:var(--danger)}
.trans-cat{font-size:9px;padding:2px 8px;border-radius:10px;background:rgba(100,116,139,.1);color:var(--text-muted)}
.trans-date{font-size:10px;color:var(--text-muted)}
</style>
</head>
<body>

<div class="top-bar">
  <div class="tb-left">
    <div class="tb-brand">💰 财务管理</div>
    <div class="tb-sub">收支记录 · 利润分析</div>
  </div>
  <div class="tb-right"><span class="tb-badge">v2.0</span></div>
</div>

<div class="fin-summary" id="finSummary"></div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="搜索备注/分类..." oninput="render()">

<div class="popup-overlay" id="popup">
  <div class="popup">
    <h3 id="popupTitle">💰 新增交易</h3>
    <label id="transTypeLabel">金额 (¥)</label>
    <input type="number" id="transAmount" placeholder="0.00" step="0.01">
    <label>分类</label>
    <select id="transCategory"></select>
    <label>备注</label>
    <input type="text" id="transNote" placeholder="备注...">
    <label>日期</label>
    <input type="date" id="transDate">
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closePopup()">取消</button>
      <button class="btn btn-primary" onclick="save()">✅ 保存</button>
    </div>
    <input type="hidden" id="editId"><input type="hidden" id="transType">
  </div>
</div>

<script src="../_shared/js/yihuang.js"></script>
<script src="../_shared/js/yihuang-db.js"></script>
<script>
const $=id=>document.getElementById(id);
const INCOME_CATS=['销售收入','服务收入','退款','其他收入'];
const EXPENSE_CATS=['差旅','办公用品','采购成本','营销推广','交通','餐饮','房租水电','工资','税费','其他支出'];

let DATA=loadData('yihuang_finance')||{transactions:[]};
let filter='all';

function saveAll(){saveData('yihuang_finance',DATA);}

function render(){
  const q=$('searchInput').value.toLowerCase();
  let f=DATA.transactions;
  if(filter==='income')f=f.filter(t=>t.type==='income');
  else if(filter==='expense')f=f.filter(t=>t.type==='expense');
  if(q)f=f.filter(t=>(t.note||'').toLowerCase().includes(q)||(t.category||'').toLowerCase().includes(q));

  const totalInc=DATA.transactions.filter(t=>t.type==='income').reduce((s,t)=>s+parseFloat(t.amount||0),0);
  const totalExp=DATA.transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+parseFloat(t.amount||0),0);
  const profit=totalInc-totalExp;
  $('finSummary').innerHTML=`
    <div class="fin-card income"><div class="fc-value">¥${totalInc.toFixed(0)}</div><div class="fc-label">总收入</div></div>
    <div class="fin-card expense"><div class="fc-value">¥${totalExp.toFixed(0)}</div><div class="fc-label">总支出</div></div>
    <div class="fin-card profit" style="grid-column:1/-1"><div class="fc-value" style="${profit>=0?'color:var(--success)':'color:var(--danger)'}">${profit>=0?'+':''}¥${profit.toFixed(2)}</div><div class="fc-label">净利润</div></div>`;

  const labels=[{id:'all',label:'全部('+DATA.transactions.length+')'},{id:'income',label:'收入('+DATA.transactions.filter(t=>t.type==='income').length+')'},{id:'expense',label:'支出('+DATA.transactions.filter(t=>t.type==='expense').length+')'}];
  $('filterTabs').innerHTML=labels.map(l=>`<div class="filter-tab ${filter===l.id?'active':''}" onclick="filter='${l.id}';render()">${l.label}</div>`).join('');

  const el=$('transList');
  if(!f.length){
    el.innerHTML='<div class="empty-state"><div class="empty-icon">💰</div><div class="empty-title">暂无流水记录</div><div class="empty-desc">点击"+收入"或"−支出"开始记账</div></div>';
    return;
  }
  f.sort((a,b)=>new Date(b.date||b.createdAt)-new Date(a.date||a.createdAt));
  el.innerHTML=f.map(t=>`
    <div class="trans-item fade-in">
      <div>
        <div style="font-weight:600;font-size:13px">${t.note||'未备注'}</div>
        <div><span class="trans-cat">${t.category||'未分类'}</span> <span class="trans-date">${t.date||formatDate(t.createdAt)}</span></div>
      </div>
      <div style="text-align:right">
        <div class="trans-amount ${t.type==='income'?'pos':'neg'}">${t.type==='income'?'+':'−'}¥${parseFloat(t.amount||0).toFixed(2)}</div>
        <div style="font-size:10px;color:var(--text-muted)"><span style="cursor:pointer;color:var(--accent)" onclick="edit('${t.id}')">✏️</span> <span style="cursor:pointer;color:var(--danger)" onclick="del('${t.id}')">🗑</span></div>
      </div>
    </div>`).join('');
}

function openPopup(type){
  $('popupTitle').textContent=type==='income'?'💰 新增收入':'💸 新增支出';
  $('transType').value=type;$('editId').value='';
  $('transAmount').value='';$('transNote').value='';$('transDate').value=today();
  const cats=type==='income'?INCOME_CATS:EXPENSE_CATS;
  $('transCategory').innerHTML=cats.map(c=>`<option>${c}</option>`).join('');
  $('popup').classList.add('show');
}
function closePopup(){$('popup').classList.remove('show')}

function save(){
  const amount=parseFloat($('transAmount').value);if(!amount||amount<=0)return showToast('请输入有效金额');
  const type=$('transType').value,editId=$('editId').value;
  const obj={amount,type,category:$('transCategory').value,note:$('transNote').value.trim(),date:$('transDate').value};
  if(editId){const t=DATA.transactions.find(x=>x.id===editId);if(t)Object.assign(t,obj);}
  else{obj.id=uuid();obj.createdAt=now();DATA.transactions.push(obj);}
  saveAll();render();closePopup();showToast('✅ 已记录');
}
function edit(id){const t=DATA.transactions.find(x=>x.id===id);if(!t)return;
  $('popupTitle').textContent='✏️ 编辑交易';$('editId').value=id;
  $('transType').value=t.type;$('transAmount').value=t.amount;$('transNote').value=t.note||'';$('transDate').value=t.date||today();
  const cats=t.type==='income'?INCOME_CATS:EXPENSE_CATS;
  $('transCategory').innerHTML=cats.map(c=>`<option ${c===t.category?'selected':''}>${c}</option>`).join('');
  $('popup').classList.add('show');
}
function del(id){if(confirm('确定删除？')){DATA.transactions=DATA.transactions.filter(t=>t.id!==id);saveAll();render();showToast('🗑 已删除');}}

document.querySelectorAll('.popup-overlay').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('show')})});
render();
</script>

<div class="bottom-nav">
  <a class="bn-item" href="/yihuang/dashboard/"><span class="bn-icon">📊</span><span class="bn-text">概览</span></a>
  <a class="bn-item" href="/yihuang/crm/"><span class="bn-icon">👥</span><span class="bn-text">客户</span></a>
  <a class="bn-item" href="/yihuang/orders/"><span class="bn-icon">📦</span><span class="bn-text">订单</span></a>
  <a class="bn-item" class="bn-item active" href="/yihuang/finance/"><span class="bn-icon">💰</span><span class="bn-text">财务</span></a>
  <a class="bn-item" href="/yihuang/tasks/"><span class="bn-icon">✅</span><span class="bn-text">任务</span></a>
  <a class="bn-item" href="/yihuang/quotes/"><span class="bn-icon">💵</span><span class="bn-text">报价</span></a>
  <a class="bn-item" href="/yihuang/suppliers/"><span class="bn-icon">🏭</span><span class="bn-text">供应商</span></a>
  <a class="bn-item" href="/yihuang/inventory/"><span class="bn-icon">📦</span><span class="bn-text">库存</span></a>
</div>
</body>
</html>

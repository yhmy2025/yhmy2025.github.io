<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>谊璜贸易 · 库存看板</title>
<link rel="stylesheet" href="../_shared/css/yihuang.css">
<style>
.inv-card .ic-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.inv-card .ic-name{font-size:14px;font-weight:700}
.inv-card .ic-qty{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums}
.inv-card .ic-qty.low{color:var(--danger)}
.inv-card .ic-qty.normal{color:var(--warning)}
.inv-card .ic-qty.ok{color:var(--success)}
.inv-card .ic-bar{height:5px;background:var(--border);border-radius:3px;margin:8px 0;overflow:hidden}
.inv-card .ic-bar .fill{height:100%;border-radius:3px;transition:width .5s}
.inv-card .fill.low{background:var(--danger)}
.inv-card .fill.normal{background:var(--warning)}
.inv-card .fill.ok{background:var(--success)}
.inv-card .ic-meta{font-size:11px;color:var(--text-secondary);line-height:1.6}
</style>
</head>
<body>

<div class="top-bar">
  <div class="tb-left">
    <div class="tb-brand">📦 库存看板</div>
    <div class="tb-sub">库存监控 · 安全预警</div>
  </div>
  <div class="tb-right"><span class="tb-badge">v2.0</span></div>
</div>

<div class="summary-bar" id="summary" style="grid-template-columns:repeat(4,1fr)"></div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="搜索产品..." oninput="render()">
  <button onclick="openPopup()">+ 新增</button>
<a class="bn-item" href="/yihuang/dashboard/"><span class="bn-icon">📊</span><span class="bn-text">概览</span></a>
  <a class="bn-item" href="/yihuang/suppliers/"><span class="bn-icon">🏭</span><span class="bn-text">供应商</span></a>
  <a class="bn-item active" href="/yihuang/inventory/"><span class="bn-icon">📦</span><span class="bn-text">库存</span></a>
  <a class="bn-item" href="/yihuang/orders/"><span class="bn-icon">📦</span><span class="bn-text">订单</span></a>
  <a class="bn-item" href="/yihuang/finance/"><span class="bn-icon">💰</span><span class="bn-text">财务</span></a>
  <a class="bn-item" href="/yihuang/tasks/"><span class="bn-icon">✅</span><span class="bn-text">任务</span></a>
  <a class="bn-item" href="/yihuang/quotes/"><span class="bn-icon">💵</span><span class="bn-text">报价</span></a>
  <a class="bn-item" href="/yihuang/crm/"><span class="bn-icon">👥</span><span class="bn-text">客户</span></a>
  <a class="bn-item" href="/yihuang/suppliers/"><span class="bn-icon">🏭</span><span class="bn-text">供应商</span></a>
  <a class="bn-item active" href="/yihuang/inventory/"><span class="bn-icon">📦</span><span class="bn-text">库存</span></a>
  <a class="bn-item" href="/yihuang/orders/"><span class="bn-icon">📦</span><span class="bn-text">订单</span></a>
  <a class="bn-item" href="/yihuang/finance/"><span class="bn-icon">💰</span><span class="bn-text">财务</span></a>
</div>

<div class="popup-overlay" id="popup">
  <div class="popup">
    <h3 id="popupTitle">📦 新增产品</h3>
    <label>产品名称</label><input type="text" id="invName" placeholder="如：粤盐焗鸡粉">
    <label>品类</label>
    <select id="invCategory">
      <option value="调味品">调味品</option><option value="粮食">粮食/大宗</option><option value="跨境">跨境电商</option><option value="包材">包装材料</option><option value="其他">其他</option>
    </select>
    <label>当前库存</label><input type="number" id="invQty" min="0">
    <label>单位</label><input type="text" id="invUnit" value="箱" placeholder="箱/吨/个">
    <label>安全库存</label><input type="number" id="invSafeQty" min="0" placeholder="低于此值预警">
    <label>成本价 (¥)</label><input type="number" id="invCost" step="0.01" placeholder="0.00">
    <label>备注</label><textarea id="invNotes" rows="2"></textarea>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closePopup()">取消</button>
      <button class="btn btn-primary" onclick="save()">✅ 保存</button>
    </div>
    <input type="hidden" id="editId">
  </div>
</div>

<script src="../_shared/js/yihuang.js"></script>
<script src="../_shared/js/yihuang-db.js"></script>
<script>
const $=id=>document.getElementById(id);
let DATA=loadData('yihuang_inventory')||{items:[]};
let filter='all';

function saveAll(){saveData('yihuang_inventory',DATA);}

function render(){
  const q=$('searchInput').value.toLowerCase();
  let f=DATA.items;
  if(filter==='low')f=f.filter(i=>i.qty<i.safeQty);
  else if(filter==='normal')f=f.filter(i=>i.qty>=i.safeQty&&i.qty<i.safeQty*3);
  else if(filter==='high')f=f.filter(i=>i.qty>=i.safeQty*3);
  if(q)f=f.filter(i=>i.name.toLowerCase().includes(q)||(i.category||'').toLowerCase().includes(q));

  const total=DATA.items.length,low=DATA.items.filter(i=>i.qty<i.safeQty).length;
  const totalCost=DATA.items.reduce((s,i)=>s+parseFloat(i.cost||0)*i.qty,0);
  $('summary').innerHTML=`
    <div class="summary-item"><div class="si-value">${total}</div><div class="si-label">总SKU</div></div>
    <div class="summary-item"><div class="si-value" style="color:var(--danger)">${low}</div><div class="si-label">⚠️ 低库存</div></div>
    <div class="summary-item"><div class="si-value">${total-low}</div><div class="si-label">正常</div></div>
    <div class="summary-item"><div class="si-value">¥${totalCost.toFixed(0)}</div><div class="si-label">库存价值</div></div>`;

  const tabs=[{id:'all',label:'全部'},{id:'low',label:'⚠️ 低库存('+low+')'},{id:'normal',label:'正常'},{id:'high',label:'充足'}];
  $('filterTabs').innerHTML=tabs.map(t=>`<div class="filter-tab ${filter===t.id?'active':''}" onclick="filter='${t.id}';render()">${t.label}</div>`).join('');

  const el=$('invList');
  if(!f.length){
    el.innerHTML='<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-title">暂无库存产品</div><div class="empty-desc">点击"+新增"添加产品</div></div>';
    return;
  }
  el.innerHTML=f.map(i=>{
    const pct=i.safeQty>0?Math.min(100,(i.qty/i.safeQty)*100):100;
    const level=i.qty<i.safeQty?'low':i.qty<i.safeQty*3?'normal':'ok';
    return `
    <div class="item-card inv-card fade-in">
      <div class="ic-header">
        <div class="ic-name">${i.name}</div>
        <div class="ic-qty ${level}">${i.qty}<span style="font-size:11px;font-weight:400;color:var(--text-muted)"> ${i.unit||'件'}</span></div>
      </div>
      <div class="ic-bar"><div class="fill ${level}" style="width:${pct}%"></div></div>
      <div class="ic-meta">
        📂 ${i.category||'未分类'}${i.cost?' | ¥'+parseFloat(i.cost).toFixed(2)+'/'+(i.unit||'件'):''}
        ${i.safeQty?' | 安全线:'+i.safeQty:''}
        ${i.qty<i.safeQty?'<br>⚠️ <span style="color:var(--danger)">低于安全库存，建议补货</span>':''}
        ${i.notes?'<br>💬 '+i.notes:''}
      </div>
      <div class="actions">
        <span class="act-edit" onclick="edit('${i.id}')">✏️ 编辑</span>
        <span class="act-ok" onclick="adjust('${i.id}')">📦 入库/出库</span>
        <span class="act-delete" onclick="del('${i.id}')">🗑 删除</span>
      </div>
    </div>`}).join('');
}

function openPopup(){
  $('popupTitle').textContent='📦 新增产品';$('editId').value='';
  ['invName','invQty','invUnit','invSafeQty','invCost','invNotes'].forEach(id=>$(id).value='');
  $('invCategory').value='调味品';$('invUnit').value='箱';$('popup').classList.add('show');
}
function closePopup(){$('popup').classList.remove('show')}

function save(){
  const name=$('invName').value.trim();if(!name)return showToast('请输入产品名称');
  const editId=$('editId').value;
  const obj={name,category:$('invCategory').value,qty:parseInt($('invQty').value)||0,unit:$('invUnit').value||'件',safeQty:parseInt($('invSafeQty').value)||0,cost:parseFloat($('invCost').value)||0,notes:$('invNotes').value.trim()};
  if(editId){const i=DATA.items.find(x=>x.id===editId);if(i)Object.assign(i,obj);}
  else{obj.id=uuid();obj.createdAt=now();DATA.items.push(obj);}
  saveAll();render();closePopup();showToast('✅ 已保存');
}
function edit(id){const i=DATA.items.find(x=>x.id===id);if(!i)return;
  $('popupTitle').textContent='✏️ 编辑产品';$('editId').value=id;
  $('invName').value=i.name;$('invCategory').value=i.category||'其他';$('invQty').value=i.qty;
  $('invUnit').value=i.unit||'箱';$('invSafeQty').value=i.safeQty||0;
  $('invCost').value=i.cost||0;$('invNotes').value=i.notes||'';$('popup').classList.add('show');
}
function adjust(id){const i=DATA.items.find(x=>x.id===id);if(!i)return;
  const adj=prompt(`当前库存: ${i.qty} ${i.unit}\n输入调整（正=入库，负=出库）: `);
  if(adj===null)return;const n=parseInt(adj);
  if(isNaN(n)||n===0)return showToast('无效数量');
  i.qty=Math.max(0,i.qty+n);saveAll();render();
  showToast(n>0?'📦 入库 '+n+' '+i.unit:'📤 出库 '+Math.abs(n)+' '+i.unit);
}
function del(id){if(confirm('确定删除？')){DATA.items=DATA.items.filter(i=>i.id!==id);saveAll();render();showToast('🗑 已删除');}}

document.querySelectorAll('.popup-overlay').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('show')})});
render();
</script>
</body>
</html>

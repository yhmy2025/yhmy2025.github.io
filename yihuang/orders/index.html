<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>谊璜贸易 · 订单管理</title>
<link rel="stylesheet" href="../_shared/css/yihuang.css">
<style>
.order-card .oc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.order-card .oc-id{font-size:11px;color:var(--text-muted);font-family:monospace}
.order-card .oc-client{font-size:14px;font-weight:700}
.order-card .oc-amount{font-size:20px;font-weight:800;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.order-card .oc-info{font-size:11px;color:var(--text-secondary);line-height:1.6;margin-top:4px}
.order-card .oc-status{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.oc-status.quote{background:rgba(56,189,248,.15);color:#38bdf8}
.oc-status.confirmed{background:rgba(251,191,36,.15);color:#fbbf24}
.oc-status.processing{background:rgba(129,140,248,.15);color:#818cf8}
.oc-status.shipped{background:rgba(52,211,153,.15);color:#34d399}
.oc-status.completed{background:rgba(34,197,94,.15);color:#22c55e}
.oc-status.cancelled{background:rgba(239,68,68,.15);color:#ef4444}
</style>
</head>
<body>

<div class="top-bar">
  <div class="tb-left">
    <div class="tb-brand">📦 订单管理</div>
    <div class="tb-sub">订单全生命周期跟踪</div>
  </div>
  <div class="tb-right"><span class="tb-badge">v2.0</span></div>
</div>

<div class="summary-bar" id="summary"></div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="搜索订单号/客户..." oninput="render()">
  <button onclick="openPopup()">+ 新建</button>
<a class="bn-item" href="/yihuang/dashboard/"><span class="bn-icon">📊</span><span class="bn-text">概览</span></a>
  <a class="bn-item" href="/yihuang/crm/"><span class="bn-icon">👥</span><span class="bn-text">客户</span></a>
  <a class="bn-item active" href="/yihuang/orders/"><span class="bn-icon">📦</span><span class="bn-text">订单</span></a>
  <a class="bn-item" href="/yihuang/finance/"><span class="bn-icon">💰</span><span class="bn-text">财务</span></a>
  <a class="bn-item" href="/yihuang/tasks/"><span class="bn-icon">✅</span><span class="bn-text">任务</span></a>
  <a class="bn-item" href="/yihuang/quotes/"><span class="bn-icon">💵</span><span class="bn-text">报价</span></a>
  <a class="bn-item" href="/yihuang/suppliers/"><span class="bn-icon">🏭</span><span class="bn-text">供应商</span></a>
  <a class="bn-item" href="/yihuang/inventory/"><span class="bn-icon">📦</span><span class="bn-text">库存</span></a>
  <a class="bn-item" href="/yihuang/crm/"><span class="bn-icon">👥</span><span class="bn-text">客户</span></a>
  <a class="bn-item active" href="/yihuang/orders/"><span class="bn-icon">📦</span><span class="bn-text">订单</span></a>
  <a class="bn-item" href="/yihuang/finance/"><span class="bn-icon">💰</span><span class="bn-text">财务</span></a>
  <a class="bn-item" href="/yihuang/tasks/"><span class="bn-icon">✅</span><span class="bn-text">任务</span></a>
</div>

<div class="popup-overlay" id="popup">
  <div class="popup">
    <h3 id="popupTitle">📦 新建订单</h3>
    <label>客户名称</label>
    <input type="text" id="orderClient" placeholder="客户名">
    <label>金额 (¥)</label>
    <input type="number" id="orderAmount" placeholder="0.00" step="0.01">
    <label>产品/服务</label>
    <input type="text" id="orderProduct" placeholder="产品名称或服务项目">
    <label>订单状态</label>
    <select id="orderStatus">
      <option value="quote">报价中</option><option value="confirmed">已确认</option>
      <option value="processing">处理中</option><option value="shipped">已发货</option>
      <option value="completed">已完成</option><option value="cancelled">已取消</option>
    </select>
    <label>备注</label>
    <textarea id="orderNotes" rows="2" placeholder="备注信息..."></textarea>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closePopup()">取消</button>
      <button class="btn btn-primary" onclick="save()">✅ 保存</button>
    </div>
    <input type="hidden" id="editId">
  </div>
</div>

<script src="../_shared/js/yihuang.js"></script>
<script src="../_shared/js/yihuang-db.js"></script>
<script>
const $=id=>document.getElementById(id);
let DATA=loadData('yihuang_orders')||{orders:[]};
let filter='all';

function saveAll(){saveData('yihuang_orders',DATA);}

function render(){
  const q=$('searchInput').value.toLowerCase();
  let f=DATA.orders;
  if(filter!=='all')f=f.filter(o=>o.status===filter);
  if(q)f=f.filter(o=>(o.id||'').toLowerCase().includes(q)||(o.client||'').toLowerCase().includes(q));

  const total=DATA.orders.length;
  const active=DATA.orders.filter(o=>!['completed','cancelled'].includes(o.status)).length;
  const totalAmt=DATA.orders.reduce((s,o)=>s+parseFloat(o.amount||0),0);
  $('summary').innerHTML=`
    <div class="summary-item"><div class="si-value">${total}</div><div class="si-label">总订单</div></div>
    <div class="summary-item"><div class="si-value">${active}</div><div class="si-label">进行中</div></div>
    <div class="summary-item"><div class="si-value">¥${totalAmt.toFixed(0)}</div><div class="si-label">总金额</div></div>`;

  const statusMap={'all':'全部','quote':'报价','confirmed':'已确认','processing':'处理中','shipped':'已发货','completed':'已完成','cancelled':'已取消'};
  $('filterTabs').innerHTML=Object.entries(statusMap).map(([k,v])=>`<div class="filter-tab ${filter===k?'active':''}" onclick="filter='${k}';render()">${v}</div>`).join('');

  const el=$('orderList');
  if(!f.length){
    el.innerHTML='<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-title">暂无订单</div><div class="empty-desc">点击"+新建"创建第一个订单</div></div>';
    return;
  }
  f.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const sm={quote:'报价中',confirmed:'已确认',processing:'处理中',shipped:'已发货',completed:'已完成',cancelled:'已取消'};
  el.innerHTML=f.map(o=>`
    <div class="item-card fade-in">
      <div class="oc-header">
        <span class="oc-id">#${o.id.slice(-6)}</span>
        <span class="oc-status ${o.status}">${sm[o.status]}</span>
      </div>
      <div class="oc-client">${o.client}</div>
      <div class="oc-amount">¥${parseFloat(o.amount||0).toFixed(2)}</div>
      <div class="oc-info">${o.product?'📦 '+o.product+'<br>':''}📅 ${o.createdAt?formatDate(o.createdAt):'-'}${o.notes?'<br>💬 '+o.notes:''}</div>
      <div class="actions">
        <span class="act-edit" onclick="edit('${o.id}')">✏️ 编辑</span>
        <span class="act-delete" onclick="del('${o.id}')">🗑 删除</span>
      </div>
    </div>`).join('');
}

function openPopup(){
  $('popupTitle').textContent='📦 新建订单';$('editId').value='';
  ['orderClient','orderAmount','orderProduct','orderNotes'].forEach(id=>$(id).value='');
  $('orderStatus').value='quote';$('popup').classList.add('show');
}
function closePopup(){$('popup').classList.remove('show')}

function save(){
  const client=$('orderClient').value.trim(),amount=parseFloat($('orderAmount').value)||0;
  if(!client)return showToast('请输入客户名称');
  const editId=$('editId').value;
  const obj={client,amount,product:$('orderProduct').value.trim(),status:$('orderStatus').value,notes:$('orderNotes').value.trim()};
  if(editId){const o=DATA.orders.find(x=>x.id===editId);if(o)Object.assign(o,obj);}
  else{obj.id=uuid();obj.createdAt=now();DATA.orders.push(obj);}
  saveAll();render();closePopup();showToast('✅ 已保存');
}
function edit(id){const o=DATA.orders.find(x=>x.id===id);if(!o)return;
  $('popupTitle').textContent='✏️ 编辑订单';$('editId').value=id;
  $('orderClient').value=o.client;$('orderAmount').value=o.amount;$('orderProduct').value=o.product||'';
  $('orderStatus').value=o.status;$('orderNotes').value=o.notes||'';$('popup').classList.add('show');
}
function del(id){if(confirm('确定删除？')){DATA.orders=DATA.orders.filter(o=>o.id!==id);saveAll();render();showToast('🗑 已删除');}}

document.querySelectorAll('.popup-overlay').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('show')})});
render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>经营看板 — 谊璜贸易</title>
<link rel="stylesheet" href="../_shared/css/yihuang.css">
<style>
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.stat-card { background:#1e293b; border-radius:8px; padding:14px; border:1px solid #334155; }
.stat-card .num { font-size:26px; font-weight:700; margin:4px 0; }
.stat-card .lbl { font-size:11px; color:#94a3b8; }
.stat-card .trend { font-size:12px; }
.trend-up { color:#86efac; }
.trend-down { color:#fca5a5; }
.sys-banner { border-radius:8px; padding:12px 16px; margin-bottom:12px; display:flex; align-items:center; gap:10px; font-size:13px; }
.sys-ok { background:#0f1a0f; border:1px solid #22c55e; color:#86efac; }
.sys-warn { background:#1a150f; border:1px solid #f59e0b; color:#fde68a; }
.sys-danger { background:#1a0f0f; border:1px solid #ef4444; color:#fca5a5; }
.quick-actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.quick-btn { display:block; text-align:center; padding:14px 8px; border-radius:8px; background:#1e293b; border:1px solid #334155; color:#e2e8f0; text-decoration:none; font-size:13px; transition:all .15s; }
.quick-btn:hover { background:#1e3a5f; border-color:#3b82f6; }
.quick-btn .icon { font-size:24px; display:block; margin-bottom:4px; }
.card-compact { padding:10px 14px; margin-bottom:6px; border-radius:8px; background:#1e293b; font-size:13px; display:flex; justify-content:space-between; align-items:center; }
</style>
</head>
<body>
<div class="header">
  <h1>经营看板</h1>
  <p class="sub" id="lastUpdate"></p>
</div>

<!-- System Status Banner -->
<div id="sysBanner"></div>

<!-- Key Stats -->
<div class="stat-grid" id="statGrid"></div>

<!-- Quick Actions -->
<div class="card">
  <div class="card-title">快速操作</div>
  <div class="quick-actions">
    <a href="../quotes/" class="quick-btn"><span class="icon">💵</span>新建报价单</a>
    <a href="../orders/" class="quick-btn"><span class="icon">📦</span>新建订单</a>
    <a href="../inventory/log.html" class="quick-btn"><span class="icon">📋</span>库存盘点</a>
    <a href="../suppliers/scoring.html" class="quick-btn"><span class="icon">⭐</span>供应商评分</a>
  </div>
</div>

<!-- Low Stock Alerts -->
<div class="card">
  <div class="card-title">低库存预警</div>
  <div id="lowStockList"></div>
</div>

<!-- Recent Activity -->
<div class="card">
  <div class="card-title">近期动态</div>
  <div id="recentActivity"></div>
</div>

<div class="footer">谊璜贸易系统 · 经营看板</div>
<nav class="bottom-nav" id="bottomNav"></nav>

<script src="../_shared/js/yihuang-db.js"></script>
<script src="../_shared/js/yihuang.js"></script>
<script>
function renderBanner() {
  const stats = YH.getDashboardStats();
  const inv = YH.getInventory();
  const alerts = inv.filter(i => i.quantity <= (i.safetyStock || 10));
  const criticals = alerts.filter(i => i.quantity <= (i.safetyStock || 10) * 0.5);

  let cls, msg;
  if (criticals.length > 0) {
    cls = 'sys-danger';
    msg = `${criticals.length} 个产品库存危急（低于安全线50%）—— 请立即补货或调整安全库存`;
  } else if (alerts.length > 0) {
    cls = 'sys-warn';
    msg = `${alerts.length} 个产品库存低于安全线 —— 建议近期补货`;
  } else {
    cls = 'sys-ok';
    msg = '系统运行正常 · 所有产品库存安全';
  }

  document.getElementById('sysBanner').innerHTML = `
    <div class="sys-banner ${cls}">${msg}</div>
  `;
}

function renderStats() {
  const stats = YH.getDashboardStats();
  const clients = YH.getClients();
  const orders = YH.getOrders();
  const suppliers = YH.getSuppliers();

  // This week new clients
  const weekAgo = new Date(Date.now() - 7*86400000).toISOString();
  const newClients = clients.filter(c => (c.createdAt||'') > weekAgo).length;

  // This month orders
  const monthStart = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString();
  const monthOrders = orders.filter(o => (o.createdAt||'') > monthStart);
  const monthTotal = monthOrders.reduce((s, o) => s + (parseFloat(o.totalPrice)||0), 0);

  document.getElementById('statGrid').innerHTML = `
    <div class="stat-card">
      <div class="lbl">待处理任务</div>
      <div class="num" style="color:#fbbf24;">${stats.tasks}</div>
      <div class="trend">今日需关注</div>
    </div>
    <div class="stat-card">
      <div class="lbl">本月订单金额</div>
      <div class="num" style="color:#38bdf8;">¥${monthTotal.toLocaleString()}</div>
      <div class="trend trend-up">${monthOrders.length} 笔订单</div>
    </div>
    <div class="stat-card">
      <div class="lbl">客户总数</div>
      <div class="num" style="color:#86efac;">${clients.length}</div>
      <div class="trend trend-up">本周 +${newClients}</div>
    </div>
    <div class="stat-card">
      <div class="lbl">累计利润</div>
      <div class="num" style="color:${stats.profit>=0?'#86efac':'#fca5a5'};">¥${stats.profit.toLocaleString()}</div>
      <div class="trend">供应商 ${suppliers.length} 家</div>
    </div>
    <div class="stat-card">
      <div class="lbl">进行中交易</div>
      <div class="num" style="color:#c084fc;">${stats.deals}</div>
      <div class="trend">待完成订单</div>
    </div>
    <div class="stat-card">
      <div class="lbl">低库存预警</div>
      <div class="num" style="color:${stats.lowStock>0?'#fca5a5':'#86efac'};">${stats.lowStock}</div>
      <div class="trend ${stats.lowStock>0?'trend-down':''}">${stats.lowStock>0?'需补货':'安全'}</div>
    </div>
  `;
}

function renderLowStock() {
  const lowItems = YH.getLowStockItems();
  if (lowItems.length === 0) {
    document.getElementById('lowStockList').innerHTML =
      '<p style="color:#94a3b8;text-align:center;padding:16px;">所有产品库存充足</p>';
    return;
  }
  document.getElementById('lowStockList').innerHTML = lowItems.map(i => {
    const ratio = i.quantity / (i.safetyStock || 10);
    const color = ratio <= 0.5 ? '#fca5a5' : '#fde68a';
    const tag = ratio <= 0.5 ? '危急' : '偏低';
    return `<div class="card-compact">
      <span>${i.name||i.productName||i.id}</span>
      <div style="text-align:right;">
        <span style="font-weight:600;color:${color};">${i.quantity}</span>
        <span style="font-size:11px;color:#64748b;margin-left:4px;">/ ${i.safetyStock||10}</span>
        <span style="display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;margin-left:6px;background:${color}20;color:${color};">${tag}</span>
      </div>
    </div>`;
  }).join('');
}

function renderActivity() {
  const items = [];
  // Recent orders
  const orders = YH.getOrders().slice(-3);
  orders.forEach(o => {
    items.push({
      time: o.createdAt, icon: '📦',
      text: `新订单: ${o.clientName||'客户'} — ¥${o.totalPrice||o.amount||0} [${o.status||'pending'}]`
    });
  });
  // Recent clients
  const clients = YH.getClients().slice(-2);
  clients.forEach(c => {
    items.push({
      time: c.createdAt, icon: '👤',
      text: `新客户: ${c.name||c.company||'--'} (${c.source||'-'})`
    });
  });
  // Recent finance
  const finance = YH.getFinance().slice(-2);
  finance.forEach(f => {
    items.push({
      time: f.createdAt, icon: f.type==='income'?'💰':'💸',
      text: `${f.type==='income'?'收入':'支出'}: ${f.category||''} ¥${f.amount}`
    });
  });

  items.sort((a,b) => (b.time||'').localeCompare(a.time||''));
  document.getElementById('recentActivity').innerHTML = items.slice(0,8).map(i => `
    <div style="padding:8px 0;border-bottom:1px solid #334155;font-size:13px;display:flex;align-items:center;gap:8px;">
      <span>${i.icon}</span>
      <span style="flex:1;">${i.text}</span>
      <span style="font-size:11px;color:#64748b;">${(i.time||'').slice(0,10)}</span>
    </div>
  `).join('') || '<p style="color:#64748b;text-align:center;padding:16px;">暂无动态</p>';
}

function init() {
  renderBanner();
  renderStats();
  renderLowStock();
  renderActivity();
  document.getElementById('lastUpdate').textContent =
    '数据刷新: ' + new Date().toLocaleTimeString('zh-CN');
  if (typeof renderBottomNav === 'function') {
    document.getElementById('bottomNav').innerHTML = renderBottomNav('dashboard');
  }
}
init();
</script>
</body>
</html>
